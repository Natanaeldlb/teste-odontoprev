name: Automação E2E - KaBuM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: Rodar Testes Playwright
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Instalar navegadores Playwright
        run: npx playwright install chromium

      - name: Rodar testes E2E
        run: npx playwright test tests/

      - name: Rodar testes de API
        run: npx playwright test api-tests/

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7